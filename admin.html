<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeSud — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#060d1a;--ink2:#0b1625;--ink3:#0f1e32;
  --gold:#f0b429;--gold2:#ffd166;
  --silver:#99aabb;--white:#f0f4f8;--text:#dde6f0;
  --muted:#6e7f94;--card:#0d1c2e;--border:rgba(240,180,41,.18);
  --green:#00e676;--red:#ff4757;--blue:#4fc3f7;--orange:#ff6b35;
}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);min-height:100vh}

#login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3rem;width:360px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.login-logo{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);text-align:center;margin-bottom:.3rem}
.login-sub{text-align:center;font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:2.5rem}
.login-field{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1.2rem}
.login-field label{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.login-field input{background:var(--ink2);border:1px solid rgba(184,196,212,.15);color:var(--text);padding:13px 16px;border-radius:8px;font-family:'DM Sans';font-size:.95rem;outline:none;transition:.2s}
.login-field input:focus{border-color:rgba(240,180,41,.5);box-shadow:0 0 0 3px rgba(240,180,41,.06)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;padding:14px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s;margin-top:.5rem}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(240,180,41,.4)}
.login-err{color:var(--red);font-size:.82rem;text-align:center;margin-top:.8rem;display:none}

header{background:rgba(6,13,26,.97);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:66px;position:sticky;top:0;z-index:50;backdrop-filter:blur(16px)}
.hdr-logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);display:flex;align-items:center;gap:.5rem}
.hdr-logo span{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-family:'DM Sans'}
.hdr-right{display:flex;align-items:center;gap:1.2rem}
.hdr-badge{background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.25);color:var(--gold);font-size:.7rem;padding:5px 14px;border-radius:20px;letter-spacing:1px;text-transform:uppercase}
.logout-btn{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:var(--red);font-size:.72rem;padding:7px 16px;border-radius:6px;cursor:pointer;transition:.2s;letter-spacing:1px;text-transform:uppercase}
.logout-btn:hover{background:rgba(255,71,87,.2)}
.back-btn{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.2);color:var(--gold);font-size:.72rem;padding:7px 16px;border-radius:6px;cursor:pointer;transition:.2s;letter-spacing:1px;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-btn:hover{background:rgba(240,180,41,.15)}

.admin-wrap{max-width:1300px;margin:0 auto;padding:2.5rem 2rem}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;margin-bottom:2.5rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.5rem;display:flex;align-items:center;gap:1.2rem;transition:.3s}
.stat-card:hover{border-color:rgba(240,180,41,.35);transform:translateY(-2px)}
.stat-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-icon.gold{background:rgba(240,180,41,.12)}
.stat-icon.green{background:rgba(0,230,118,.1)}
.stat-icon.blue{background:rgba(79,195,247,.1)}
.stat-icon.red{background:rgba(255,71,87,.1)}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--white);line-height:1}
.stat-lbl{font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

.filters{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{background:var(--ink2);border:1px solid rgba(184,196,212,.12);color:var(--muted);padding:8px 18px;border-radius:20px;font-size:.75rem;cursor:pointer;transition:.2s;letter-spacing:1px;text-transform:uppercase}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(240,180,41,.07)}
.search-box{flex:1;max-width:320px;background:var(--ink2);border:1px solid rgba(184,196,212,.12);color:var(--text);padding:9px 16px;border-radius:20px;font-family:'DM Sans';font-size:.88rem;outline:none;transition:.2s}
.search-box:focus{border-color:rgba(240,180,41,.4)}
.search-box::placeholder{color:var(--muted)}
.actions-right{margin-left:auto;display:flex;gap:.8rem}
.action-btn{background:var(--ink2);border:1px solid rgba(184,196,212,.12);color:var(--silver);padding:8px 16px;border-radius:8px;font-size:.75rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:.5rem}
.action-btn:hover{border-color:var(--gold);color:var(--gold)}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-head{display:grid;grid-template-columns:32px 1fr 1.2fr 1fr 1fr 90px 80px;gap:1rem;padding:1rem 1.5rem;background:var(--ink3);border-bottom:1px solid var(--border);font-size:.66rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.table-body{max-height:calc(100vh - 380px);overflow-y:auto}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-track{background:transparent}
.table-body::-webkit-scrollbar-thumb{background:rgba(240,180,41,.2);border-radius:2px}
.row{display:grid;grid-template-columns:32px 1fr 1.2fr 1fr 1fr 90px 80px;gap:1rem;padding:1.1rem 1.5rem;border-bottom:1px solid rgba(184,196,212,.06);transition:.2s;align-items:center;cursor:pointer}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(240,180,41,.04)}
.row.unread{background:rgba(240,180,41,.03)}
.row.unread .r-nome{color:var(--gold);font-weight:600}
.unread-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(240,180,41,.5)}
.r-nome{font-size:.9rem;color:var(--white)}
.r-email{font-size:.85rem;color:var(--silver)}
.r-data{font-size:.78rem;color:var(--muted)}
.tipo-badge{font-size:.62rem;letter-spacing:.5px;padding:4px 10px;border-radius:20px;display:inline-block;white-space:nowrap}
.tipo-badge.news{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.25)}
.tipo-badge.ecom{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.tipo-badge.sito{background:rgba(240,180,41,.1);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.tipo-badge.admin{background:rgba(255,107,53,.1);color:var(--orange);border:1px solid rgba(255,107,53,.25)}
.tipo-badge.ai{background:rgba(200,100,255,.1);color:#c866ff;border:1px solid rgba(200,100,255,.25)}
.tipo-badge.altro{background:rgba(184,196,212,.08);color:var(--silver);border:1px solid rgba(184,196,212,.2)}
.r-actions{display:flex;gap:.4rem}
.btn-sm{width:30px;height:30px;border-radius:6px;border:1px solid rgba(184,196,212,.15);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;font-size:.75rem}
.btn-sm:hover{border-color:var(--gold);background:rgba(240,180,41,.08)}
.btn-sm.del:hover{border-color:var(--red);background:rgba(255,71,87,.08)}

.detail-overlay{position:fixed;inset:0;background:rgba(6,13,26,.8);z-index:200;opacity:0;pointer-events:none;transition:.3s;backdrop-filter:blur(6px)}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:440px;background:var(--ink2);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:.35s;overflow-y:auto;padding:2rem}
.detail-overlay.open .detail-panel{transform:translateX(0)}
.dp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem}
.dp-name{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--white)}
.dp-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.07);border:none;color:var(--silver);cursor:pointer;font-size:1.1rem;transition:.2s;flex-shrink:0}
.dp-close:hover{background:var(--red);color:#fff}
.dp-field{margin-bottom:1.3rem}
.dp-label{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.dp-val{font-size:.92rem;color:var(--text);line-height:1.6;background:var(--ink3);border:1px solid var(--border);border-radius:8px;padding:.9rem 1.1rem}
.dp-val a{color:var(--blue);text-decoration:none}
.dp-val a:hover{text-decoration:underline}
.dp-msg{white-space:pre-wrap;line-height:1.75}
.dp-actions{display:flex;gap:.8rem;margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border)}
.dp-btn{flex:1;padding:12px;border-radius:8px;border:none;font-size:.8rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.dp-btn.reply{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000}
.dp-btn.reply:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(240,180,41,.35)}
.dp-btn.whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff}
.dp-btn.delete{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.25);color:var(--red)}
.dp-btn.delete:hover{background:rgba(255,71,87,.25)}

.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
.empty-state .emoji{font-size:3rem;margin-bottom:1rem}
.empty-state h3{font-family:'Playfair Display',serif;color:var(--silver);font-size:1.3rem;margin-bottom:.5rem}
.empty-state p{font-size:.88rem;line-height:1.7}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink3);border:1px solid var(--green);color:var(--white);padding:.9rem 1.8rem;border-radius:30px;font-size:.85rem;z-index:500;opacity:0;transition:.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:900px){
  .stats-bar{grid-template-columns:1fr 1fr}
  .table-head{display:none}
  .row{grid-template-columns:8px 1fr auto;gap:.8rem}
  .r-email,.r-tipo,.r-data{display:none}
  .detail-panel{width:100%}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">CodeSud<span style="color:var(--gold2)">.</span></div>
    <div class="login-sub">Area Amministrativa</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="admin" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="login-btn">Accedi →</button>
    <div class="login-err" id="login-err">Credenziali errate. Riprova.</div>
    <p style="text-align:center;color:var(--muted);font-size:.75rem;margin-top:1.5rem">Demo: <span style="color:var(--gold)">admin</span> / <span style="color:var(--gold)">codesud2025</span></p>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel">
    <div class="dp-header">
      <div>
        <div class="dp-name" id="dp-name">—</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:3px" id="dp-data">—</div>
      </div>
      <button class="dp-close" id="dp-close">✕</button>
    </div>
    <div class="dp-field"><div class="dp-label">Email</div><div class="dp-val" id="dp-email">—</div></div>
    <div class="dp-field"><div class="dp-label">Telefono</div><div class="dp-val" id="dp-tel">—</div></div>
    <div class="dp-field"><div class="dp-label">Tipo progetto</div><div class="dp-val" id="dp-tipo">—</div></div>
    <div class="dp-field"><div class="dp-label">Messaggio</div><div class="dp-val dp-msg" id="dp-msg">—</div></div>
    <div class="dp-actions">
      <button class="dp-btn reply" id="dp-reply">✉ Rispondi via Email</button>
      <button class="dp-btn whatsapp" id="dp-wa">WhatsApp</button>
    </div>
    <div class="dp-actions" style="margin-top:0;padding-top:1rem;border-top:none">
      <button class="dp-btn delete" id="dp-del">🗑 Elimina richiesta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<header id="main-header" style="display:none">
  <div class="hdr-logo">
    CodeSud<span style="color:var(--gold2);font-family:'Playfair Display',serif">.</span>Studio
    <span>/ Admin</span>
  </div>
  <div class="hdr-right">
    <a class="back-btn" href="index.html">← Sito</a>
    <div class="hdr-badge" id="unread-badge">— non lette</div>
    <button class="logout-btn" id="logout-btn">Esci →</button>
  </div>
</header>

<div class="admin-wrap" id="admin-wrap" style="display:none">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-icon gold">📨</div><div><div class="stat-num" id="s-tot">0</div><div class="stat-lbl">Totale richieste</div></div></div>
    <div class="stat-card"><div class="stat-icon red">🔴</div><div><div class="stat-num" id="s-new">0</div><div class="stat-lbl">Non lette</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-num" id="s-read">0</div><div class="stat-lbl">Lette</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">📅</div><div><div class="stat-num" id="s-oggi">0</div><div class="stat-lbl">Oggi</div></div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-filter="tutti">Tutte</button>
    <button class="filter-btn" data-filter="unread">Non lette</button>
    <button class="filter-btn" data-filter="sito">Siti web</button>
    <button class="filter-btn" data-filter="ecom">E-commerce</button>
    <button class="filter-btn" data-filter="ai">AI</button>
    <input class="search-box" type="text" placeholder="Cerca per nome, email…" id="search-inp">
    <div class="actions-right">
      <button class="action-btn" id="seed-btn">＋ Demo dati</button>
      <button class="action-btn" id="clear-btn">🗑 Cancella tutto</button>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-head">
      <div></div><div>Nome</div><div>Email</div><div>Tipo progetto</div><div>Data</div><div>Stato</div><div>Azioni</div>
    </div>
    <div class="table-body" id="table-body"></div>
  </div>
</div>

<script>
// ── CREDENZIALI ──────────────────────────────────────────
const CRED = {user:'admin', pass:'codesud2025'};

// ── DATA ────────────────────────────────────────────────
function getData(){ return JSON.parse(localStorage.getItem('codesud_richieste')||'[]'); }
function setData(d){ localStorage.setItem('codesud_richieste',JSON.stringify(d)); }

let currentFilter = 'tutti';
let currentDetailId = null;

// ── TIPO UTILS ──────────────────────────────────────────
function getTipoKey(tipo){
  if(!tipo) return 'altro';
  const t=tipo.toLowerCase();
  if(t.includes('news')||t.includes('blog')||t.includes('portale')) return 'news';
  if(t.includes('e-commerce')||t.includes('ecommerce')) return 'ecom';
  if(t.includes('sito')||t.includes('landing')) return 'sito';
  if(t.includes('admin')||t.includes('gestionale')) return 'admin';
  if(t.includes('ai')||t.includes('automazione')) return 'ai';
  return 'altro';
}
const tipoLabels={news:'News/Blog',ecom:'E-Commerce',sito:'Sito Web',admin:'Gestionale',ai:'AI',altro:'Altro'};

// ── STATS ───────────────────────────────────────────────
function updateStats(){
  const d=getData();
  const oggi=new Date().toLocaleDateString('it-IT');
  const nonLette=d.filter(r=>!r.letto).length;
  document.getElementById('s-tot').textContent=d.length;
  document.getElementById('s-new').textContent=nonLette;
  document.getElementById('s-read').textContent=d.filter(r=>r.letto).length;
  document.getElementById('s-oggi').textContent=d.filter(r=>r.data&&r.data.startsWith(oggi)).length;
  document.getElementById('unread-badge').textContent=nonLette+' non '+(nonLette===1?'letta':'lette');
}

// ── RENDER TABLE ────────────────────────────────────────
function renderTable(){
  const data=getData();
  const search=document.getElementById('search-inp').value.toLowerCase();
  const tbody=document.getElementById('table-body');
  let filtered=data.filter(r=>{
    const ok= !search ||
      (r.nome||'').toLowerCase().includes(search)||
      (r.cognome||'').toLowerCase().includes(search)||
      (r.email||'').toLowerCase().includes(search)||
      (r.messaggio||'').toLowerCase().includes(search);
    if(!ok) return false;
    if(currentFilter==='tutti') return true;
    if(currentFilter==='unread') return !r.letto;
    return getTipoKey(r.tipo)===currentFilter;
  });
  if(!filtered.length){
    tbody.innerHTML=`<div class="empty-state"><div class="emoji">📭</div><h3>Nessuna richiesta trovata</h3><p>Non ci sono messaggi che corrispondono ai filtri selezionati.</p></div>`;
    updateStats(); return;
  }
  tbody.innerHTML=filtered.map(r=>{
    const tk=getTipoKey(r.tipo);
    const nomeFull=`${r.nome||'—'} ${r.cognome||''}`.trim();
    const statoStyle=r.letto
      ?'background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)'
      :'background:rgba(240,180,41,.1);color:var(--gold);border:1px solid rgba(240,180,41,.25)';
    return `<div class="row ${r.letto?'':'unread'}" data-id="${r.id}">
      <div>${r.letto?'':'<div class="unread-dot"></div>'}</div>
      <div class="r-nome">${nomeFull}</div>
      <div class="r-email">${r.email||'—'}</div>
      <div><span class="tipo-badge ${tk}">${tipoLabels[tk]}</span></div>
      <div class="r-data">${r.data||'—'}</div>
      <div><span style="font-size:.7rem;padding:4px 10px;border-radius:20px;${statoStyle}">${r.letto?'Letta':'Nuova'}</span></div>
      <div class="r-actions">
        <button class="btn-sm open-btn" data-id="${r.id}" title="Apri">👁</button>
        <button class="btn-sm del del-btn" data-id="${r.id}" title="Elimina">🗑</button>
      </div>
    </div>`;
  }).join('');
  updateStats();
  // attach row events
  tbody.querySelectorAll('.row').forEach(row=>{
    row.addEventListener('click', e=>{
      if(!e.target.closest('.r-actions')) openDetail(Number(row.dataset.id));
    });
  });
  tbody.querySelectorAll('.open-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();openDetail(Number(btn.dataset.id));});
  });
  tbody.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();deleteRow(Number(btn.dataset.id));});
  });
}

// ── DETAIL ──────────────────────────────────────────────
function openDetail(id){
  const data=getData();
  const r=data.find(x=>x.id===id);
  if(!r) return;
  currentDetailId=id;
  r.letto=true; setData(data); renderTable();
  const nomeFull=`${r.nome||'—'} ${r.cognome||''}`.trim();
  document.getElementById('dp-name').textContent=nomeFull;
  document.getElementById('dp-data').textContent=r.data||'—';
  document.getElementById('dp-email').innerHTML=`<a href="mailto:${r.email}">${r.email||'—'}</a>`;
  document.getElementById('dp-tel').textContent=r.telefono||'Non fornito';
  document.getElementById('dp-tipo').textContent=r.tipo||'—';
  document.getElementById('dp-msg').textContent=r.messaggio||'(nessun messaggio)';
  document.getElementById('dp-reply').onclick=()=>{window.location='mailto:'+r.email+'?subject=Re: Richiesta progetto web — CodeSud Studio';};
  const waNum=r.telefono?r.telefono.replace(/\D/g,''):null;
  const waBtn=document.getElementById('dp-wa');
  if(waNum){waBtn.disabled=false;waBtn.style.opacity='1';waBtn.onclick=()=>window.open('https://wa.me/'+waNum,'_blank');}
  else{waBtn.disabled=true;waBtn.style.opacity='.4';}
  document.getElementById('dp-del').onclick=()=>{deleteRow(id);closeDetailPanel();};
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetailPanel(){
  document.getElementById('detail-overlay').classList.remove('open');
  currentDetailId=null;
}

// ── DELETE ──────────────────────────────────────────────
function deleteRow(id){
  if(!confirm('Eliminare questa richiesta?')) return;
  setData(getData().filter(r=>r.id!==id));
  renderTable(); showToast('Richiesta eliminata');
}

// ── TOAST ────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── SHOW ADMIN UI ────────────────────────────────────────
function showAdmin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-header').style.display='flex';
  document.getElementById('admin-wrap').style.display='block';
  renderTable();
  updateStats();
}

// ── LOGIN ────────────────────────────────────────────────
function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value;
  if(u===CRED.user && p===CRED.pass){
    sessionStorage.setItem('cs_admin','1');
    showAdmin();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('l-pass').value='';
    document.getElementById('l-pass').focus();
  }
}

// ── INIT (dopo DOM pronto) ───────────────────────────────
document.addEventListener('DOMContentLoaded', function(){

  // Auto-login se sessione attiva
  if(sessionStorage.getItem('cs_admin')==='1'){
    showAdmin();
  }

  // Login button e Enter
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('l-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('l-user').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('l-pass').focus(); });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', ()=>{
    sessionStorage.removeItem('cs_admin');
    location.reload();
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentFilter=btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    });
  });

  // Search
  document.getElementById('search-inp').addEventListener('input', renderTable);

  // Detail close
  document.getElementById('dp-close').addEventListener('click', closeDetailPanel);
  document.getElementById('detail-overlay').addEventListener('click', e=>{
    if(e.target===document.getElementById('detail-overlay')) closeDetailPanel();
  });

  // Seed & clear
  document.getElementById('seed-btn').addEventListener('click', seedDemo);
  document.getElementById('clear-btn').addEventListener('click', ()=>{
    if(!confirm('Eliminare TUTTE le richieste? Questa azione non è reversibile.')) return;
    setData([]); renderTable(); showToast('Tutte le richieste eliminate');
  });

  // ESC close detail
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetailPanel(); });
});
</script>
